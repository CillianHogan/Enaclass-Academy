<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login - Academia Enaclass </title>
</head>
<body class="body-login">
    <div class="contenedor-login">
        <div class="login-box">
            <h1>Academia Enaclass</h1>
            <p>Introduce tus credenciales para acceder</p>
            
            <form id="form-login" action="area-estudiante.html">
                <div class="campo">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@enaclass.com" required>
                </div>
                
                <div class="campo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>

                <button type="submit" class="btn-login">Iniciar sesión</button>
            </form>
            
            <a href="index.html" class="volver-inicio">← Volver a la página principal</a>
        </div>
    </div>
</body>
</html>
